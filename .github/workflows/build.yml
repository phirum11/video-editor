name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.0'
        arch: 'win64_mingw'
        modules: 'qtmultimedia'

    - name: Download FFmpeg
      run: |
        curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip
        7z x ffmpeg.zip
        mkdir -p video_studio/third_party/ffmpeg
        cp -r ffmpeg-master-latest-win64-gpl-shared/bin video_studio/third_party/ffmpeg/
        cp -r ffmpeg-master-latest-win64-gpl-shared/include video_studio/third_party/ffmpeg/
        cp -r ffmpeg-master-latest-win64-gpl-shared/lib video_studio/third_party/ffmpeg/
      shell: bash

    - name: Configure CMake
      working-directory: ${{ github.workspace }}/video_studio
      run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

    - name: Build
      working-directory: ${{ github.workspace }}/video_studio
      run: cmake --build build --config Release -j 4
